{% extends "base.html" %}
{% block content %}

<h2 style="text-align:center; color:#004466;">🔐 Login Admin</h2>

<div style="max-width: 400px; margin: auto; padding: 20px; background: #f9f9f9; border-radius: 8px; box-shadow: 0 0 8px rgba(0,0,0,0.1);">
    <form method="POST">
        <label>👤 Username:</label><br>
        <input type="text" name="username" required style="width:100%; padding:8px; margin-bottom: 12px; border:1px solid #ccc; border-radius:5px;"><br>

        <label>🔒 Password:</label><br>
        <input type="password" name="password" required style="width:100%; padding:8px; margin-bottom: 16px; border:1px solid #ccc; border-radius:5px;"><br>

        <button type="submit" class="btn" style="width:100%;">Login</button>
    </form>
</div>

{% endblock %}
